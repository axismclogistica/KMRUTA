<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyXXXXXXX"></script>

<style>
body{font-family:Arial;background:#0a0a0a;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:25px}
h1{color:#00c2a8}
.card{background:#141414;padding:20px;border-radius:15px;margin-top:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
label{font-size:14px;color:#aaa}
select,input{padding:12px;border-radius:10px;border:none;width:100%;background:#1f1f1f;color:white}
button{padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn{background:#00c2a8;color:black}
.lista{margin-top:10px}
.item{background:#1f1f1f;padding:10px;border-radius:8px;margin-bottom:5px}
</style>
</head>
<body>

<div class="container">
<h1>Axis MC Logística</h1>

<div class="card">
<label>Inicio de Ruta</label>
<input id="inicio">
</div>

<div class="card">
<div class="grid">
<div>
<label>Provincia</label>
<select id="provincia" onchange="loadCantones()"></select>
</div>
<div>
<label>Cantón</label>
<select id="canton" onchange="loadDistritos()"></select>
</div>
<div>
<label>Distrito</label>
<select id="distrito"></select>
</div>
<div>
<label>Señas</label>
<input id="senas">
</div>
</div>
<button class="btn" onclick="agregar()">Agregar</button>
</div>

<div class="card">
<div id="lista"></div>
<button class="btn" onclick="calcular()">Calcular</button>
</div>

</div>

<script>

const dataCR={
"San José":{
"Central":["Carmen","Merced","Hospital","Catedral","Zapote"],
"Escazú":["Escazú","San Rafael","San Antonio"]
},
"Alajuela":{
"Central":["Alajuela","San José","Carrizal"],
"San Ramón":["San Ramón","Santiago"]
},
"Heredia":{
"Heredia":["Heredia","Mercedes","San Francisco"],
"Santo Domingo":["Santo Domingo","San Vicente"]
},
"Cartago":{
"Central":["Oriental","Occidental","Carmen"]
},
"Guanacaste":{
"Liberia":["Liberia","Cañas Dulces"]
},
"Puntarenas":{
"Puntarenas":["Puntarenas","Chacarita"]
},
"Limón":{
"Limón":["Limón","Valle La Estrella"]
}
};

let direcciones=[];

function init(){
let p=document.getElementById('provincia');
p.innerHTML='<option value="">Seleccione</option>';
Object.keys(dataCR).forEach(x=>p.innerHTML+=`<option value="${x}">${x}</option>`);
}

function loadCantones(){
let p=provincia.value;
let c=document.getElementById('canton');
c.innerHTML='';
Object.keys(dataCR[p]||{}).forEach(x=>c.innerHTML+=`<option value="${x}">${x}</option>`);
loadDistritos();
}

function loadDistritos(){
let p=provincia.value;
let c=canton.value;
let d=document.getElementById('distrito');
d.innerHTML='';
(dataCR[p]?.[c]||[]).forEach(x=>d.innerHTML+=`<option value="${x}">${x}</option>`);
}

function agregar(){
if(!provincia.value||!canton.value||!distrito.value)return alert('Completa datos');
let dir=`${provincia.value}, ${canton.value}, ${distrito.value}, Costa Rica ${senas.value}`;
direcciones.push(dir);
render();
}

function render(){
lista.innerHTML=direcciones.map((d,i)=>`<div class='item'>${i+1}. ${d}</div>`).join('');
}

async function calcular(){
let inicio=document.getElementById('inicio').value;
if(!inicio)return alert('Inicio requerido');

let puntos=[inicio,...direcciones];
let service=new google.maps.DistanceMatrixService();
let total=0;

for(let i=0;i<puntos.length-1;i++){
let res=await new Promise(resolve=>{
service.getDistanceMatrix({origins:[puntos[i]],destinations:[puntos[i+1]],travelMode:'DRIVING'},(r)=>resolve(r));
});

if(!res.rows[0].elements[0].distance){alert('Error en dirección');return;}

let km=res.rows[0].elements[0].distance.value/1000;
total+=km;
}

alert('Total KM: '+total.toFixed(2)+' | ₡'+(total*580).toFixed(0));
}

init();

</script>

</body>
</html>
