<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8&libraries=places&callback=initMap" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0b0f14;color:white;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#121821;padding:15px;border-radius:15px;margin-top:15px}
input{padding:10px;width:100%;margin-top:5px;background:#1c2633;color:white;border:none;border-radius:8px}
button{padding:10px;border:none;border-radius:10px;margin-top:10px;cursor:pointer}
.btn{background:#00e0c2;color:black}
.item{background:#1c2633;padding:8px;margin:5px 0;border-radius:8px}
.deleteBtn{float:right;background:#ff4d4d;color:white;border:none;border-radius:6px;padding:3px 8px;cursor:pointer}
.reset{background:#ff4d4d;color:white}
</style>
</head>

<body>

<div class="container">
<h2>Axis MC Logística</h2>

<div class="card">
<label>Inicio</label>
<input id="inicio">
</div>

<div class="card">
<label>Destino</label>
<input id="direccion">
<button class="btn" onclick="agregar()">Agregar</button>
</div>

<div class="card">
<div id="lista"></div>

<button class="btn" onclick="calcular()">Calcular</button>
<button class="btn" onclick="generarPDF()">PDF</button>
<button class="reset" onclick="resetear()">Reiniciar</button>
</div>

</div>

<script>

// 🔥 IMPORTANTE PARA GOOGLE MAPS
function initMap(){
new google.maps.places.Autocomplete(document.getElementById("inicio"));
new google.maps.places.Autocomplete(document.getElementById("direccion"));
}

// DATA
let direcciones=[];
let dataFinal=null;

// AGREGAR
function agregar(){
if(!direccion.value) return alert("Escribí un destino");

direcciones.push(direccion.value);
renderLista();
direccion.value="";
}

// RENDER LISTA
function renderLista(){
lista.innerHTML = direcciones.map((d,i)=>`
<div class="item">
${i+1}. ${d}
<button class="deleteBtn" onclick="eliminar(${i})">X</button>
</div>
`).join('');
}

// ELIMINAR
function eliminar(index){
direcciones.splice(index,1);
renderLista();
}

// REINICIAR
function resetear(){
direcciones=[];
dataFinal=null;

lista.innerHTML="";
inicio.value="";
direccion.value="";
}

// CALCULAR SIMPLE (SIN OPTIMIZAR)
async function calcular(){

if(!inicio.value) return alert("Falta inicio");
if(direcciones.length===0) return alert("Agregá destinos");

let service = new google.maps.DistanceMatrixService();
let puntos=[inicio.value,...direcciones];

let totalKM=0;

for(let i=0;i<puntos.length-1;i++){
let res=await new Promise(r=>{
service.getDistanceMatrix({
origins:[puntos[i]],
destinations:[puntos[i+1]],
travelMode:'DRIVING'
},d=>r(d));
});

totalKM+=res.rows[0].elements[0].distance.value/1000;
}

let totalFinal = totalKM * 580;

dataFinal={
totalKM,
totalFinal,
puntos
};

alert("Total: CRC "+totalFinal.toFixed(0));
}

// PDF
function generarPDF(){
if(!dataFinal) return alert("Calculá primero");

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("AXIS MC LOGISTICA",105,15,null,null,"center");

doc.text("Distancia: "+dataFinal.totalKM.toFixed(2)+" km",20,40);
doc.text("Total: CRC "+dataFinal.totalFinal.toFixed(0),20,50);

doc.save("Cotizacion.pdf");
}

</script>

</body>
</html>
