<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística PRO</title>

<!-- GOOGLE MAPS (IMPORTANTE: CAMBIÁ TU API KEY) -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8&libraries=places&callback=initMap" async defer></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0b0f14;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#121821;padding:15px;border-radius:15px;margin-top:15px}
input,select{padding:10px;width:100%;margin-top:5px;background:#1c2633;color:white;border:none;border-radius:8px}
button{padding:10px;border:none;border-radius:10px;margin-top:10px;cursor:pointer}
.btn{background:#00e0c2;color:black}
.item{background:#1c2633;padding:8px;margin:5px 0;border-radius:8px}
footer{text-align:center;margin-top:20px;color:#888}
</style>
</head>

<body>

<div class="container">
<h2>Axis MC Logística</h2>

<div class="card">
<label>Cliente</label>
<input id="cliente">
</div>

<div class="card">
<label>Inicio</label>
<input id="inicio">
</div>

<div class="card">
<label>Peso</label>
<input id="peso">
</div>

<div class="card">
<label>Destino</label>
<input id="direccion">
<button class="btn" onclick="agregar()">Agregar</button>
</div>

<div class="card">
<div id="lista"></div>
<button class="btn" onclick="calcular()">Calcular</button>
<button class="btn" onclick="generarPDF()">PDF</button>
<button onclick="resetear()">Reiniciar</button>
</div>

</div>

<footer>© 2026 Axis MC Logística | Costa Rica</footer>

<script>

let direcciones=[];
let dataFinal=null;

// 🔥 FIX GOOGLE MAPS
window.initMap=function(){
try{
new google.maps.places.Autocomplete(document.getElementById("inicio"));
new google.maps.places.Autocomplete(document.getElementById("direccion"));
}catch(e){
console.log("Maps error:",e);
}
}

// AGREGAR
function agregar(){
if(!direccion.value) return alert("Escribí una dirección");

direcciones.push(direccion.value);
renderLista();
direccion.value="";
}

// LISTA
function renderLista(){
lista.innerHTML=direcciones.map((d,i)=>`
<div class="item">
${d}
<button onclick="eliminar(${i})" style="float:right">X</button>
</div>
`).join('');
}

// ELIMINAR
function eliminar(i){
direcciones.splice(i,1);
renderLista();
}

// RESET
function resetear(){
direcciones=[];
dataFinal=null;
lista.innerHTML="";
inicio.value="";
direccion.value="";
cliente.value="";
peso.value="";
}

// TARIFA
function tarifaKM(){
let base=580;
return base;
}

// CALCULAR (OPTIMIZADO)
async function calcular(){

if(!inicio.value) return alert("Falta inicio");
if(direcciones.length===0) return alert("Agregá destinos");

let service=new google.maps.DirectionsService();

let res=await new Promise(resolve=>{
service.route({
origin: inicio.value,
destination: direcciones[direcciones.length-1],
waypoints: direcciones.slice(0,-1).map(d=>({location:d,stopover:true})),
optimizeWaypoints:true,
travelMode:'DRIVING'
},resolve);
});

let totalKM=0;

res.routes[0].legs.forEach(l=>{
totalKM+=l.distance.value/1000;
});

let totalFinal=totalKM*tarifaKM();

dataFinal={
cliente: cliente.value || "Cliente",
totalKM,
totalFinal,
puntos: res.routes[0].legs.map(l=>l.start_address)
};

alert("Total: CRC "+totalFinal.toFixed(0));
}

// PDF
function generarPDF(){
if(!dataFinal) return alert("Calculá primero");

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(16);
doc.text("AXIS MC LOGISTICA",105,15,null,null,"center");

doc.setFontSize(10);
doc.text("Cliente: "+dataFinal.cliente,20,30);
doc.text("Fecha: "+new Date().toLocaleDateString(),20,36);

doc.text("Distancia: "+dataFinal.totalKM.toFixed(2)+" km",20,50);
doc.text("Total: CRC "+dataFinal.totalFinal.toFixed(0),20,56);

doc.save("Cotizacion.pdf");
}

</script>

</body>
</html>
