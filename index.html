<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística PRO</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8&libraries=places"></script>

<style>
body{font-family:'Segoe UI',Arial;background:#0b0f14;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:25px}
h1{color:#00e0c2}
.card{background:#121821;padding:20px;border-radius:18px;margin-top:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
select,input{padding:12px;border-radius:10px;border:none;width:100%;background:#1c2633;color:white}
button{padding:14px;border:none;border-radius:12px;margin-top:10px}
.btn{background:#00e0c2;color:black}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.8);justify-content:center;align-items:center}
.modal-box{background:#121821;padding:25px;border-radius:20px;width:90%;max-width:600px}
</style>
</head>

<body>

<div class="container">
<h1>🚚 Axis MC Logística</h1>

<div class="card">
<input id="inicio" placeholder="Punto de inicio">
<input id="destino" placeholder="Destino">
<input id="peso" placeholder="Peso kg">

<button class="btn" onclick="calcular()">Calcular</button>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<h2>Resultado</h2>
<p id="km"></p>
<p id="total"></p>
<button onclick="modal.style.display='none'">Cerrar</button>
</div>
</div>

<script>

new google.maps.places.Autocomplete(inicio,{componentRestrictions:{country:"cr"}});
new google.maps.places.Autocomplete(destino,{componentRestrictions:{country:"cr"}});

// 🔥 PRECIO POR KM SEGÚN DISTANCIA
function precioPorKM(dist){

if(dist <= 25) return 12500;
else if(dist <= 50) return 10500;
else if(dist <= 75) return 9500;
else return 8500;

}

// 🔥 MULTIPLICADOR POR PESO
function factorPeso(peso){

if(peso <= 200) return 1;
else if(peso <= 500) return 1.15;
else if(peso <= 1000) return 1.30;
else return 1.5;

}

async function calcular(){

if(!inicio.value || !destino.value){
return alert("Completa direcciones");
}

let service=new google.maps.DistanceMatrixService();

let res=await new Promise(r=>{
service.getDistanceMatrix({
origins:[inicio.value],
destinations:[destino.value],
travelMode:'DRIVING'
},d=>r(d));
});

let kmVal=res.rows[0].elements[0].distance.value/1000;

let precioKM=precioPorKM(kmVal);
let pesoVal=parseFloat(peso.value)||0;
let factor=factorPeso(pesoVal);

// 🔥 TOTAL FINAL
let total=kmVal * precioKM * factor;

// 🔥 MÍNIMO INTELIGENTE
if(total < 15000) total = 15000;

km.innerText="Distancia: "+kmVal.toFixed(2)+" km";
total.innerText="Total: ₡ "+Math.round(total);

modal.style.display='flex';

}

</script>

</body>
</html>
