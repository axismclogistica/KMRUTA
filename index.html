<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística PRO</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8&libraries=places"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0a0a0a;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:25px}
h1{color:#00c2a8}
.card{background:#141414;padding:20px;border-radius:15px;margin-top:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
label{font-size:14px;color:#aaa}
select,input{padding:12px;border-radius:10px;border:none;width:100%;background:#1f1f1f;color:white}
button{padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn{background:#00c2a8;color:black}
.item{background:#1f1f1f;padding:10px;border-radius:8px;margin-bottom:5px}
</style>
</head>
<body>

<div class="container">
<h1>Axis MC Logística</h1>

<div class="card">
<label>Inicio</label>
<input id="inicio">
</div>

<div class="card grid">
<div>
<label>Vehículo</label>
<select id="vehiculo">
<option value="auto">Auto</option>
<option value="pickup">Pickup</option>
</select>
</div>
<div>
<label>Peso</label>
<input id="peso">
</div>
</div>

<div class="card">
<div class="grid">
<div>
<label>Provincia</label>
<select id="provincia" onchange="loadCantones()"></select>
</div>
<div>
<label>Cantón</label>
<select id="canton"></select>
</div>
<div>
<label>Dirección</label>
<input id="direccion">
</div>
</div>
<button class="btn" onclick="agregar()">Agregar</button>
</div>

<div class="card">
<div id="lista"></div>
<button class="btn" onclick="calcular()">Calcular</button>
<button class="btn" onclick="generarPDF()">PDF</button>
</div>
</div>

<script>

// ✅ LISTA COMPLETA DE 82 CANTONES
const cantonesCR={
"San José":["Central","Escazú","Desamparados","Puriscal","Tarrazú","Aserrí","Mora","Goicoechea","Santa Ana","Alajuelita","Vásquez de Coronado","Acosta","Tibás","Moravia","Montes de Oca","Turrubares","Dota","Curridabat","Pérez Zeledón","León Cortés"],
"Alajuela":["Central","San Ramón","Grecia","San Mateo","Atenas","Naranjo","Palmares","Poás","Orotina","San Carlos","Zarcero","Sarchí","Upala","Los Chiles","Guatuso","Río Cuarto"],
"Cartago":["Central","Paraíso","La Unión","Jiménez","Turrialba","Alvarado","Oreamuno","El Guarco"],
"Heredia":["Heredia","Barva","Santo Domingo","Santa Bárbara","San Rafael","San Isidro","Belén","Flores","San Pablo","Sarapiquí"],
"Guanacaste":["Liberia","Nicoya","Santa Cruz","Bagaces","Carrillo","Cañas","Abangares","Tilarán","Nandayure","La Cruz","Hojancha"],
"Puntarenas":["Puntarenas","Esparza","Buenos Aires","Montes de Oro","Osa","Quepos","Golfito","Coto Brus","Parrita","Corredores","Garabito"],
"Limón":["Limón","Pococí","Siquirres","Talamanca","Matina","Guácimo"]
};

let direcciones=[];
let dataFinal=null;

function init(){
let prov=document.getElementById('provincia');
prov.innerHTML='<option value="">Seleccione</option>';
Object.keys(cantonesCR).forEach(p=>{
prov.innerHTML+=`<option value="${p}">${p}</option>`;
});
}

function loadCantones(){
let p=document.getElementById('provincia').value;
let canton=document.getElementById('canton');
canton.innerHTML='<option value="">Seleccione</option>';
(cantonesCR[p]||[]).forEach(c=>{
canton.innerHTML+=`<option value="${c}">${c}</option>`;
});
}

new google.maps.places.Autocomplete(document.getElementById("inicio"),{componentRestrictions:{country:"cr"}});
new google.maps.places.Autocomplete(document.getElementById("direccion"),{componentRestrictions:{country:"cr"}});

function agregar(){
let p=document.getElementById('provincia').value;
let c=document.getElementById('canton').value;
let d=document.getElementById('direccion').value;
if(!p||!c||!d)return alert('Complete datos');
let dir=`${p}, ${c}, ${d}`;
direcciones.push(dir);
render();
}

function render(){
let lista=document.getElementById('lista');
lista.innerHTML=direcciones.map((d,i)=>`<div class='item'>${i+1}. ${d}</div>`).join('');
}

function tarifaKM(){
let base=580;
let pesoVal=parseFloat(document.getElementById('peso').value)||0;
let extra=0;
if(pesoVal>50 && pesoVal<=200) extra=620;
else if(pesoVal>200 && pesoVal<=500) extra=920;
else if(pesoVal>500 && pesoVal<=1000) extra=1320;
else if(pesoVal>1000) extra=1520;
return base+extra;
}

async function calcular(){
let inicio=document.getElementById('inicio').value;
if(!inicio)return alert('Inicio requerido');

let puntos=[inicio,...direcciones];
let service=new google.maps.DistanceMatrixService();
let totalKM=0;

for(let i=0;i<puntos.length-1;i++){
let res=await new Promise(r=>{
service.getDistanceMatrix({origins:[puntos[i]],destinations:[puntos[i+1]],travelMode:'DRIVING'},d=>r(d));
});

let km=res.rows[0].elements[0].distance.value/1000;
totalKM+=km;
}

let tkm=tarifaKM();
let totalFinal=totalKM*tkm;

alert(`KM: ${totalKM.toFixed(2)}\n₡/KM: ${tkm}\nTOTAL: ₡${totalFinal.toFixed(0)}`);

// guardar para PDF
dataFinal={totalKM,tkm,totalFinal,puntos};
}

function generarPDF(){
if(!dataFinal){
alert('Primero calcula');
return;
}

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

// 🔥 LOGO (base64 para que SIEMPRE funcione)
let logo="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAAB";

try{
doc.text("Axis MC Logística",20,20);
doc.text("Cotización",20,30);

doc.text(`Inicio: ${dataFinal.puntos[0]}`,20,50);

let y=60;
dataFinal.puntos.slice(1).forEach((p,i)=>{
doc.text(`Destino ${i+1}: ${p}`,20,y);
y+=10;
});

y+=10;
doc.text(`KM: ${dataFinal.totalKM.toFixed(2)}`,20,y);
y+=10;
doc.text(`Tarifa: ₡${dataFinal.tkm}`,20,y);
y+=10;
doc.text(`TOTAL: ₡${dataFinal.totalFinal.toFixed(0)}`,20,y);

doc.save("Cotizacion_Axis.pdf");

}catch(e){
alert('Error generando PDF');
console.error(e);
}
}

init();
</script>

</body>
</html>
