<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística</title>

<!-- API CORRECTA -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8"></script>

<style>
body{font-family:Arial;background:#0a0a0a;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:25px}
h1{color:#00c2a8}
.card{background:#141414;padding:20px;border-radius:15px;margin-top:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
label{font-size:14px;color:#aaa}
select,input{padding:12px;border-radius:10px;border:none;width:100%;background:#1f1f1f;color:white}
button{padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn{background:#00c2a8;color:black}
.lista{margin-top:10px}
.item{background:#1f1f1f;padding:10px;border-radius:8px;margin-bottom:5px}
</style>
</head>
<body>

<div class="container">
<h1>Axis MC Logística</h1>

<div class="card">
<label>Inicio de Ruta</label>
<input id="inicio" placeholder="Ej: Heredia Centro">
</div>

<div class="card">
<div class="grid">
<div>
<label>Provincia</label>
<select id="provincia" onchange="loadCantones()"></select>
</div>
<div>
<label>Cantón</label>
<select id="canton" onchange="loadDistritos()"></select>
</div>
<div>
<label>Distrito</label>
<select id="distrito"></select>
</div>
<div>
<label>Señas (opcional)</label>
<input id="senas" placeholder="Opcional">
</div>
</div>
<button class="btn" onclick="agregar()">Agregar</button>
</div>

<div class="card">
<div id="lista"></div>
<button class="btn" onclick="calcular()">Calcular</button>
</div>

</div>

<script>

// BASE MÁS COMPLETA CR
const dataCR={
"San José":{
"Central":["Carmen","Merced","Hospital","Catedral","Zapote","San Francisco de Dos Ríos"],
"Escazú":["Escazú","San Rafael","San Antonio"],
"Desamparados":["Desamparados","San Miguel","San Juan de Dios","San Rafael Arriba"]
},
"Alajuela":{
"Central":["Alajuela","San José","Carrizal","San Antonio"],
"San Ramón":["San Ramón","Santiago","San Juan"]
},
"Heredia":{
"Heredia":["Heredia","Mercedes","San Francisco","Ulloa"],
"Santo Domingo":["Santo Domingo","San Vicente","Paracito"],
"San Pablo":["San Pablo","Rincón de Sabanilla"]
},
"Cartago":{
"Central":["Oriental","Occidental","Carmen","San Nicolás"],
"Paraíso":["Paraíso","Santiago","Orosi"]
},
"Guanacaste":{
"Liberia":["Liberia","Cañas Dulces","Mayorga"],
"Nicoya":["Nicoya","Mansión","Sámara"]
},
"Puntarenas":{
"Puntarenas":["Puntarenas","Chacarita","Barranca"],
"Garabito":["Jacó","Tárcoles"]
},
"Limón":{
"Limón":["Limón","Valle La Estrella","Río Blanco"],
"Pococí":["Guápiles","Cariari","Rita"]
}
};

let direcciones=[];

function init(){
provincia.innerHTML='<option value="">Seleccione</option>';
Object.keys(dataCR).forEach(p=>{
provincia.innerHTML+=`<option value="${p}">${p}</option>`;
});
}

function loadCantones(){
let p=provincia.value;
canton.innerHTML='';
Object.keys(dataCR[p]||{}).forEach(c=>{
canton.innerHTML+=`<option value="${c}">${c}</option>`;
});
loadDistritos();
}

function loadDistritos(){
let p=provincia.value;
let c=canton.value;
distrito.innerHTML='';
(dataCR[p]?.[c]||[]).forEach(d=>{
distrito.innerHTML+=`<option value="${d}">${d}</option>`;
});
}

function agregar(){
if(!provincia.value||!canton.value||!distrito.value)return alert('Faltan datos');

let dir=`${provincia.value}, ${canton.value}, ${distrito.value}, Costa Rica`;

if(senas.value.trim()!==""){
dir+=` ${senas.value}`;
}


direcciones.push(dir);
render();
}

function render(){
lista.innerHTML=direcciones.map((d,i)=>`<div class='item'>${i+1}. ${d}</div>`).join('');
}

async function calcular(){
let inicio=document.getElementById('inicio').value;
if(!inicio)return alert('Inicio requerido');

let puntos=[inicio,...direcciones];
let service=new google.maps.DistanceMatrixService();
let total=0;

for(let i=0;i<puntos.length-1;i++){
let res=await new Promise(resolve=>{
service.getDistanceMatrix({origins:[puntos[i]],destinations:[puntos[i+1]],travelMode:'DRIVING'},(r)=>resolve(r));
});

let el=res.rows[0].elements[0];
if(!el||el.status!="OK"){
alert('Error en dirección: '+puntos[i]);
return;
}

let km=el.distance.value/1000;
total+=km;
}

alert(`Total: ${total.toFixed(2)} km | ₡${(total*580).toFixed(0)}`);
}

init();

</script>

</body>
</html>
