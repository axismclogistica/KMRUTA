<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística PRO</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8&libraries=places"></script>

<style>
body{font-family:Arial;background:#0a0a0a;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:25px}
h1{color:#00c2a8}
.card{background:#141414;padding:20px;border-radius:15px;margin-top:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
label{font-size:14px;color:#aaa}
select,input{padding:12px;border-radius:10px;border:none;width:100%;background:#1f1f1f;color:white}
button{padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn{background:linear-gradient(45deg,#00c2a8,#00e0c2);color:black}
.lista{margin-top:10px}
.item{background:#1f1f1f;padding:10px;border-radius:8px;margin-bottom:5px}

/* MODAL PRO */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.85);justify-content:center;align-items:center}
.modal-content{background:#111;padding:25px;border-radius:18px;width:95%;max-width:700px;box-shadow:0 0 40px rgba(0,194,168,.3)}
.header-modal{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.header-modal h2{color:#00c2a8;margin:0}
.close{cursor:pointer;font-size:22px}
.resumen{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:15px}
.box{background:#1a1a1a;padding:15px;border-radius:12px;text-align:center}
.box h3{margin:5px 0;color:#00e0c2}
.detalle{margin-top:15px;max-height:200px;overflow:auto}
.detalle p{background:#1f1f1f;padding:10px;border-radius:8px;margin-bottom:8px;font-size:13px}
</style>
</head>
<body>

<div class="container">
<h1>Axis MC Logística</h1>

<div class="card">
<label>Inicio de Ruta</label>
<input id="inicio">
</div>

<div class="card grid">
<div>
<label>Vehículo</label>
<select id="vehiculo">
<option value="auto">🚗 Auto</option>
<option value="pickup">🚚 PickUp / Camión</option>
</select>
</div>
<div>
<label>Peso (kg)</label>
<input id="peso">
</div>
</div>

<div class="card">
<div class="grid">
<div>
<label>Provincia</label>
<select id="provincia" onchange="loadCantones()"></select>
</div>
<div>
<label>Cantón</label>
<select id="canton"></select>
</div>
<div>
<label>Dirección</label>
<input id="direccion">
</div>
</div>
<button class="btn" onclick="agregar()">Agregar destino</button>
</div>

<div class="card">
<div id="lista"></div>
<button class="btn" onclick="calcular()">Calcular Ruta</button>
<button class="btn" onclick="descargar()">Descargar</button>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<div class="header-modal">
<h2>📊 Resumen de Ruta</h2>
<span class="close" onclick="modal.style.display='none'">✖</span>
</div>

<div class="resumen">
<div class="box">
<p>Distancia</p>
<h3 id="kmTotal">0 km</h3>
</div>
<div class="box">
<p>Total</p>
<h3 id="precioTotal">₡0</h3>
</div>
<div class="box">
<p>Subtotal</p>
<h3 id="subtotal">₡0</h3>
</div>
<div class="box">
<p>Combustible</p>
<h3 id="combustible">₡0</h3>
</div>
</div>

<div class="detalle" id="detalle"></div>

</div>
</div>

<script>

const cantonesCR={"San José":["Central","Escazú","Desamparados"],"Heredia":["Heredia","San Pablo"]};
let direcciones=[];
let resultadoTXT="";

function init(){
provincia.innerHTML='<option value="">Seleccione</option>';
Object.keys(cantonesCR).forEach(p=>{
provincia.innerHTML+=`<option>${p}</option>`;
});
}

function loadCantones(){
let p=provincia.value;
canton.innerHTML='';
(cantonesCR[p]||[]).forEach(c=>{
canton.innerHTML+=`<option>${c}</option>`;
});
}

const autocomplete=new google.maps.places.Autocomplete(document.getElementById("direccion"),{componentRestrictions:{country:"cr"}});

function agregar(){
if(!provincia.value||!canton.value||!direccion.value)return alert('Faltan datos');
let dir=`${provincia.value}, ${canton.value}, ${direccion.value}`;
direcciones.push(dir);
render();
}

function render(){
lista.innerHTML=direcciones.map((d,i)=>`<div class='item'>${i+1}. ${d}</div>`).join('');
}

function calcularTarifa(km){
let tipo=vehiculo.value;
let peso=parseFloat(pesoInput.value)||0;
let base=580;
let extra=0;

if(tipo!=='auto'){
if(peso>50 && peso<=200) extra=50;
else if(peso>200 && peso<=500) extra=120;
else if(peso>500 && peso<=1000) extra=250;
else if(peso>1000) extra=400;
}

let subtotal=km*(base+extra);
let combustible=subtotal*0.10;
let total=subtotal+combustible;

return {subtotal,combustible,total};
}

async function calcular(){
let inicio=document.getElementById('inicio').value;
if(!inicio)return alert('Inicio requerido');

let puntos=[inicio,...direcciones];
let service=new google.maps.DistanceMatrixService();
let totalKM=0;
let detalleHTML="";

for(let i=0;i<puntos.length-1;i++){
let res=await new Promise(r=>{
service.getDistanceMatrix({origins:[puntos[i]],destinations:[puntos[i+1]],travelMode:'DRIVING'},(d)=>r(d));
});

let km=res.rows[0].elements[0].distance.value/1000;
totalKM+=km;

detalleHTML+=`<p>🚚 Tramo ${i+1}: ${km.toFixed(2)} km<br>${puntos[i]} → ${puntos[i+1]}</p>`;
}

let datos=calcularTarifa(totalKM);

kmTotal.innerText=totalKM.toFixed(2)+" km";
precioTotal.innerText="₡"+datos.total.toFixed(0);
subtotal.innerText="₡"+datos.subtotal.toFixed(0);
combustible.innerText="₡"+datos.combustible.toFixed(0);
detalle.innerHTML=detalleHTML;

resultadoTXT=`KM:${totalKM} Total:${datos.total}`;

modal.style.display='flex';
}

function descargar(){
if(!resultadoTXT)return alert('Calcula primero');
let blob=new Blob([resultadoTXT]);
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='ruta.txt';
a.click();
}

const pesoInput=document.getElementById('peso');
init();

</script>

</body>
</html>
