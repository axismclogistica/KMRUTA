<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística PRO</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}
.container{max-width:1200px;margin:auto;padding:20px}
h1{color:#00c2a8}
.card{background:#141414;padding:20px;border-radius:15px;margin-top:15px}
input{width:100%;padding:14px;border-radius:10px;border:none;background:#1f1f1f;color:white;margin-top:5px}
button{padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn{background:linear-gradient(45deg,#00c2a8,#00e0c2);color:black}
.lista{margin-top:10px}
.item{background:#1f1f1f;padding:10px;border-radius:8px;margin-bottom:5px}
#map{height:400px;margin-top:15px;border-radius:15px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.8);justify-content:center;align-items:center}
.modal-content{background:#111;padding:25px;border-radius:15px;width:95%;max-width:700px}
</style>
</head>
<body>

<div class="container">
<h1>Axis MC Logística PRO</h1>

<div class="card">
<label>Inicio de Ruta</label>
<input id="inicio">
</div>

<div class="card">
<label>Agregar destino (autocompletado)</label>
<input id="direccion">
<button class="btn" onclick="agregar()">Agregar</button>
</div>

<div class="card">
<h3>Ruta</h3>
<div id="lista"></div>
<button class="btn" onclick="calcular()">Calcular Ruta</button>
<button class="btn" onclick="descargar()">Descargar PDF</button>
</div>

<div id="map"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content" id="resultado"></div>
</div>

<script>
let direcciones=[];
let resultadoTXT="";
let map;
let directionsService;
let directionsRenderer;

function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:9.93,lng:-84.08},
zoom:10
});

directionsService=new google.maps.DirectionsService();
directionsRenderer=new google.maps.DirectionsRenderer();
directionsRenderer.setMap(map);
}

const autocomplete=new google.maps.places.Autocomplete(document.getElementById("direccion"),{
componentRestrictions:{country:"cr"}
});

function agregar(){
let dir=document.getElementById("direccion").value;
if(!dir)return alert("Escribe dirección");

direcciones.push(dir);
render();
}

function render(){
lista.innerHTML=direcciones.map((d,i)=>`<div class='item'>${i+1}. ${d}</div>`).join('');
}

async function calcular(){
let inicio=document.getElementById("inicio").value;
if(!inicio)return alert("Inicio requerido");

let waypoints=direcciones.map(d=>({location:d,stopover:true}));

let request={
origin:inicio,
destination:direcciones[direcciones.length-1],
waypoints:waypoints.slice(0,-1),
travelMode:'DRIVING'
};


directionsService.route(request,function(result,status){
if(status==='OK'){
directionsRenderer.setDirections(result);

let total=0;
let legs=result.routes[0].legs;
let detalle="";

legs.forEach((leg,i)=>{
let km=leg.distance.value/1000;
total+=km;
detalle+=`<p><b>Tramo ${i+1}:</b> ${km.toFixed(2)} km<br>${leg.start_address} → ${leg.end_address}</p>`;
});

let precio=total*580;

resultadoTXT=`Total KM: ${total.toFixed(2)} | ₡${precio.toFixed(0)}`;

resultado.innerHTML=`
<h2>Resumen</h2>
<p><b>Total KM:</b> ${total.toFixed(2)}</p>
<p><b>Total ₡:</b> ${precio.toFixed(0)}</p>
${detalle}
<button class='btn' onclick='modal.style.display="none"'>Cerrar</button>
`;

modal.style.display='flex';

}else{
alert('Error en ruta');
}
});
}

function descargar(){
if(!resultadoTXT)return alert("Calcula primero");
let blob=new Blob([resultadoTXT],{type:'text/plain'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='ruta_axis_pro.txt';
a.click();
}

window.onload=initMap;
</script>

</body>
</html>
