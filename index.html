<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística PRO</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8&libraries=places&callback=initMap" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:'Segoe UI',Arial;background:#0b0f14;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:25px}
h1{color:#00e0c2}
.card{background:#121821;padding:20px;border-radius:18px;margin-top:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
input,select{padding:12px;border-radius:10px;border:none;width:100%;background:#1c2633;color:white}
button{padding:14px;border:none;border-radius:12px;margin-top:10px}
.btn{background:#00e0c2;color:black}
.item{background:#1c2633;padding:10px;border-radius:8px;margin-bottom:5px}

footer{text-align:center;padding:15px;margin-top:30px;font-size:13px;color:#8fa3b0}
</style>
</head>

<body>

<div class="container">
<h1>Axis MC Logística</h1>

<div class="card">
<label>Cliente</label>
<input id="cliente">
</div>

<div class="card">
<label>Inicio</label>
<input id="inicio">
</div>

<div class="card grid">
<input id="peso" placeholder="Peso">
</div>

<div class="card">
<div class="grid">
<select id="provincia" onchange="loadCantones()"></select>
<select id="canton"></select>
<input id="direccion" placeholder="Dirección">
</div>
<button class="btn" onclick="agregar()">Agregar</button>
</div>

<div class="card">
<div id="lista"></div>
<button class="btn" onclick="calcular()">Calcular</button>
<button class="btn" onclick="generarPDF()">PDF</button>
<button class="btn" onclick="resetear()">Reiniciar</button>
</div>
</div>

<footer>© 2026 Axis MC Logística | Costa Rica</footer>

<script>

let direcciones=[];
let dataFinal=null;

function initMap(){
new google.maps.places.Autocomplete(document.getElementById("inicio"),{componentRestrictions:{country:"cr"}});
new google.maps.places.Autocomplete(document.getElementById("direccion"),{componentRestrictions:{country:"cr"}});
init();
}

const cantonesCR={
"San José":["Central","Escazú"],
"Alajuela":["Central","San Ramón"],
"Heredia":["Heredia","Barva"]
};

function init(){
provincia.innerHTML='<option>Provincia</option>';
Object.keys(cantonesCR).forEach(p=>provincia.innerHTML+=`<option>${p}</option>`);
}

function loadCantones(){
canton.innerHTML='';
cantonesCR[provincia.value].forEach(c=>canton.innerHTML+=`<option>${c}</option>`);
}

function agregar(){
let dir=`${provincia.value}, ${canton.value}, ${direccion.value}`;
direcciones.push(dir);
renderLista();
}

function renderLista(){
lista.innerHTML=direcciones.map((d,i)=>`
<div class='item'>
${d}
<button onclick="eliminar(${i})">X</button>
</div>`).join('');
}

function eliminar(i){
direcciones.splice(i,1);
renderLista();
}

function resetear(){
direcciones=[];
lista.innerHTML="";
inicio.value="";
direccion.value="";
peso.value="";
cliente.value="";
}

function tarifaKM(){
let base=580;
return base;
}

async function calcular(){
let service=new google.maps.DirectionsService();

let res=await new Promise(resolve=>{
service.route({
origin: inicio.value,
destination: direcciones[direcciones.length-1],
waypoints: direcciones.slice(0,-1).map(d=>({location:d,stopover:true})),
optimizeWaypoints:true,
travelMode:'DRIVING'
},resolve);
});

let totalKM=0;

res.routes[0].legs.forEach(l=>{
totalKM+=l.distance.value/1000;
});

let totalFinal=totalKM*tarifaKM();

dataFinal={
cliente: cliente.value,
totalKM,
totalFinal,
puntos: res.routes[0].legs.map(l=>l.start_address)
};

alert("Total: "+totalFinal.toFixed(0));
}

function generarPDF(){
if(!dataFinal) return alert("Calcula primero");

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(16);
doc.text("AXIS MC LOGISTICA",105,15,null,null,"center");

doc.setFontSize(10);
doc.text("Cliente: "+dataFinal.cliente,20,30);
doc.text("Fecha: "+new Date().toLocaleDateString(),20,36);

doc.text("Distancia: "+dataFinal.totalKM.toFixed(2)+" km",20,50);
doc.text("Total: CRC "+dataFinal.totalFinal.toFixed(0),20,56);

doc.save("Cotizacion.pdf");
}

</script>

</body>
</html>
