<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística PRO</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCq2eeq7ZcxLlWmfgZNZSNWZzmmLcV8_n8&libraries=places"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:'Segoe UI',Arial;background:#0b0f14;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:25px}
h1{color:#00e0c2}
.card{background:#121821;padding:20px;border-radius:18px;margin-top:20px;box-shadow:0 0 20px rgba(0,224,194,.1)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
label{font-size:13px;color:#8fa3b0}
select,input{padding:12px;border-radius:10px;border:none;width:100%;background:#1c2633;color:white}
button{padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn{background:linear-gradient(45deg,#00c2a8,#00e0c2);color:black}
.item{background:#1c2633;padding:10px;border-radius:8px;margin-bottom:5px}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.8);justify-content:center;align-items:center}
.modal-box{background:#121821;padding:25px;border-radius:20px;width:95%;max-width:800px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat{background:#1c2633;padding:15px;border-radius:12px;text-align:center}

footer{text-align:center;padding:15px;margin-top:30px;color:#8fa3b0}

.floating-box{
position:fixed;bottom:20px;right:20px;background:#121821;
padding:15px;border-radius:15px;box-shadow:0 0 20px rgba(0,224,194,.3);
width:180px;z-index:999;
}
</style>
</head>

<body>

<div class="container">
<h1>🚚 Axis MC Logística</h1>

<div class="card">
<label>Cliente</label>
<input id="cliente">
</div>

<div class="card">
<label>Inicio</label>
<input id="inicio">
</div>

<div class="card grid">
<div>
<label>Vehículo</label>
<select id="vehiculo">
<option value="auto">Auto</option>
<option value="pickup">Pickup / Camión</option>
</select>
</div>
<div>
<label>Peso</label>
<input id="peso">
</div>
</div>

<div class="card">
<label>Destino</label>
<input id="direccion">
<button class="btn" onclick="calcular()">Calcular</button>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<h2>Cotización</h2>
<p id="km"></p>
<p id="total"></p>
<button onclick="modal.style.display='none'">Cerrar</button>
</div>
</div>

<script>

new google.maps.places.Autocomplete(inicio,{componentRestrictions:{country:"cr"}});
new google.maps.places.Autocomplete(direccion,{componentRestrictions:{country:"cr"}});

// 🔥 PRECIO POR KM SEGÚN DISTANCIA
function tarifaKM(km){
if(km <= 25) return 14500;
else if(km <= 50) return 12500;
else if(km <= 75) return 10500;
else return 9500;
}

// 🔥 FACTOR PESO
function factorPeso(peso){
if(peso <= 200) return 1;
else if(peso <= 500) return 1.15;
else if(peso <= 1000) return 1.3;
else return 1.5;
}

async function calcular(){

if(!inicio.value || !direccion.value){
return alert("Completa direcciones");
}

let service=new google.maps.DistanceMatrixService();

let res=await new Promise(r=>{
service.getDistanceMatrix({
origins:[inicio.value],
destinations:[direccion.value],
travelMode:'DRIVING'
},d=>r(d));
});

let kmVal=res.rows[0].elements[0].distance.value/1000;

let precioKM=tarifaKM(kmVal);
let pesoVal=parseFloat(peso.value)||0;
let factor=factorPeso(pesoVal);

let total=kmVal * precioKM * factor;

km.innerText="Distancia: "+kmVal.toFixed(2)+" km";
total.innerText="Total: ₡ "+Math.round(total);

modal.style.display='flex';
}

</script>

</body>
</html>
